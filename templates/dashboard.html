<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | DocuMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .chat-bubble-ai { border-radius: 0 16px 16px 16px; }
        .chat-bubble-user { border-radius: 16px 16px 0 16px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="p-2 bg-blue-600 rounded-lg text-white text-xs"><i class="fas fa-brain"></i></span>
                DocuMind
            </h1>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <p class="text-xs font-semibold text-slate-500 uppercase px-2 mb-4">Your Documents</p>
            <div id="document-list" class="space-y-1">
                <div class="text-slate-500 text-sm px-2 italic">No documents uploaded yet.</div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-900/50">
            <button id="logout-btn" class="flex items-center gap-3 w-full px-4 py-2 text-sm text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-950/50 backdrop-blur">
            <div class="flex items-center gap-3">
                <span id="active-doc-name" class="text-sm font-medium text-slate-400">Select a document to begin</span>
            </div>
            <div id="user-display" class="text-xs text-slate-500 font-medium"></div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-6">
            <div class="flex gap-4 max-w-3xl">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-xs">AI</div>
                <div class="chat-bubble-ai bg-slate-900 border border-slate-800 p-4 text-sm leading-relaxed shadow-sm">
                    Hello! I'm ready to analyze your documents. Please upload a PDF using the clip icon below.
                </div>
            </div>
        </div>

        <div class="p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
            <div class="max-w-3xl mx-auto relative group">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
                    <label class="cursor-pointer text-slate-500 hover:text-blue-500 transition p-2">
                        <i class="fas fa-paperclip text-lg"></i>
                        <input type="file" id="file-upload" class="hidden" accept=".pdf">
                    </label>
                </div>
                
                <input type="text" id="user-input" 
                    placeholder="Ask a question about the document..." 
                    class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 pl-14 pr-16 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition shadow-xl">
                
                <button id="send-btn" class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-600 mt-3">DocuMind AI can make mistakes. Check important info.</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="/static/js/auth.js"></script> <script src="/static/js/chat.js"></script>
</body>
</html>
