<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | DocuMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    
    <div class="bg-slate-900 p-10 rounded-2xl border border-slate-800 shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold mb-2 text-center">Create Account</h2>
        <p class="text-slate-400 text-center mb-8 text-sm">Join DocuMind to start chatting with your PDFs.</p>
        
        <form id="signup-form" class="space-y-4">
            <input type="email" id="signup-email" placeholder="Email Address" required
                class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-blue-500">
            <input type="password" id="signup-password" placeholder="Create Password" required
                class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-blue-500">
            <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-400">
            Already have an account? <a href="/login" class="text-blue-500 hover:underline">Sign In</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
